name: nightly-build

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: Force rebuild and republish even when HEAD matches the last successful nightly run
        required: false
        default: false
        type: boolean
      upload_pypi:
        description: Upload built distributions to PyPI
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: nightly-build
  cancel-in-progress: false

jobs:
  check-changes:
    name: Check nightly source changes
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.release-check.outputs.should_build }}
      build_date: ${{ steps.meta.outputs.build_date }}
      build_seq: ${{ steps.meta.outputs.build_seq }}
      head_sha: ${{ steps.meta.outputs.head_sha }}
      trigger_mode: ${{ steps.meta.outputs.trigger_mode }}
      forced_build: ${{ steps.meta.outputs.forced_build }}
      upload_pypi: ${{ steps.meta.outputs.upload_pypi }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compute build metadata
        id: meta
        env:
          FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force || false }}
          UPLOAD_PYPI: ${{ github.event_name != 'workflow_dispatch' || inputs.upload_pypi }}
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = '.github/workflows/nightly-build.yml';
            const currentRunId = Number(process.env.GITHUB_RUN_ID || '0');

            if (!currentRunId) {
              throw new Error('GITHUB_RUN_ID is missing; cannot compute nightly build metadata.');
            }

            const { data: currentRun } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: currentRunId,
            });

            const buildDay = (currentRun.created_at || '').slice(0, 10);
            if (!buildDay) {
              throw new Error(`Current workflow run ${currentRunId} is missing created_at.`);
            }

            const sameDayRuns = [];

            for (let page = 1; page <= 10; page += 1) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowId,
                per_page: 100,
                page,
              });

              const runs = data.workflow_runs || [];
              if (!runs.length) {
                break;
              }

              sameDayRuns.push(
                ...runs.filter((run) => (run.created_at || '').startsWith(buildDay))
              );

              if (runs[runs.length - 1]?.created_at?.slice(0, 10) < buildDay) {
                break;
              }
            }

            if (!sameDayRuns.some((run) => run.id === currentRunId)) {
              sameDayRuns.push(currentRun);
            }

            sameDayRuns.sort((left, right) => {
              const leftCreated = new Date(left.created_at || 0).getTime();
              const rightCreated = new Date(right.created_at || 0).getTime();
              return leftCreated - rightCreated || left.id - right.id;
            });

            const buildSeqIndex = sameDayRuns.findIndex((run) => run.id === currentRunId);
            if (buildSeqIndex === -1) {
              throw new Error(`Unable to locate current workflow run ${currentRunId} in the same-day run list.`);
            }

            const buildDate = buildDay.replace(/-/g, '');
            const buildSeq = String(buildSeqIndex + 1).padStart(2, '0');

            core.info(`Resolved nightly build date ${buildDate} and daily build sequence ${buildSeq}.`);
            core.setOutput('build_date', buildDate);
            core.setOutput('build_seq', buildSeq);
            core.setOutput('head_sha', currentRun.head_sha || process.env.GITHUB_SHA || context.sha);
            core.setOutput('trigger_mode', process.env.GITHUB_EVENT_NAME || context.eventName);
            core.setOutput('forced_build', process.env.FORCE_BUILD || 'false');
            core.setOutput('upload_pypi', process.env.UPLOAD_PYPI || 'true');

      - name: Compare against latest successful nightly run
        id: release-check
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ steps.meta.outputs.head_sha }}
          FORCE_BUILD: ${{ steps.meta.outputs.forced_build }}
        with:
          script: |
            let shouldBuild = true;
            const workflowId = '.github/workflows/nightly-build.yml';
            const forceBuild = String(process.env.FORCE_BUILD || '').toLowerCase() === 'true';

            if (forceBuild) {
              core.info('Force rebuild requested for workflow_dispatch; skipping prior-run SHA comparison.');
              core.setOutput('should_build', 'true');
              return;
            }

            try {
              const branch = context.ref.startsWith('refs/heads/')
                ? context.ref.replace('refs/heads/', '')
                : undefined;
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowId,
                ...(branch ? { branch } : {}),
                status: 'success',
                per_page: 10,
              });

              const currentRunId = Number(process.env.GITHUB_RUN_ID || '0');
              const previousSuccessfulRun = (data.workflow_runs || []).find(
                (run) => run.id !== currentRunId
              );
              const lastSha = previousSuccessfulRun?.head_sha || '';

              core.info(`Current HEAD: ${process.env.HEAD_SHA}`);
              core.info(`Previous successful nightly SHA: ${lastSha || 'not found'}`);

              if (lastSha === process.env.HEAD_SHA) {
                shouldBuild = false;
              }
            } catch (error) {
              core.warning(`Unable to inspect prior nightly runs: ${error.message}`);
            }

            core.setOutput('should_build', shouldBuild ? 'true' : 'false');

      - name: Write summary
        shell: bash
        run: |
          {
            echo "## Nightly build decision"
            echo
            echo "- Trigger mode: \`${{ steps.meta.outputs.trigger_mode }}\`"
            echo "- Forced build: \`${{ steps.meta.outputs.forced_build }}\`"
            echo "- Upload PyPI: \`${{ steps.meta.outputs.upload_pypi }}\`"
            echo "- Build date: \`${{ steps.meta.outputs.build_date }}\`"
            echo "- Build sequence: \`${{ steps.meta.outputs.build_seq }}\`"
            echo "- HEAD SHA: \`${{ steps.meta.outputs.head_sha }}\`"
            echo "- Should build: \`${{ steps.release-check.outputs.should_build }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build Python distributions
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: aivudaos/resources/ui/package-lock.json

      - name: Install Python build tool
        shell: bash
        run: python -m pip install --upgrade build

      - name: Build UI assets
        shell: bash
        working-directory: aivudaos/resources/ui
        run: |
          npm ci
          npm run build

      - name: Clean previous Python distributions
        shell: bash
        run: rm -rf dist build aivudaos.egg-info

      - name: Build wheel and sdist
        shell: bash
        env:
          AIVUDAOS_BUILD_DATE: ${{ needs.check-changes.outputs.build_date }}
          AIVUDAOS_BUILD_SEQ: ${{ needs.check-changes.outputs.build_seq }}
        run: python -m build

      - name: Verify distributions
        shell: bash
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          sdists=(dist/*.tar.gz)
          test "${#wheels[@]}" -gt 0
          test "${#sdists[@]}" -gt 0
          printf '%s\n' "${wheels[@]}" "${sdists[@]}" | sort

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: nightly-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish nightly release
    needs:
      - check-changes
      - build
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: nightly-dist
          path: dist

      - name: Show distribution files
        shell: bash
        run: find dist -maxdepth 1 -type f | sort

      - name: Delete existing nightly release
        uses: actions/github-script@v7
        with:
          script: |
            let release = null;

            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: 'nightly',
              });
              release = response.data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (!release) {
              const { data } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });

              release = (data || []).find((item) =>
                item.tag_name === 'nightly' || item.name === 'Nightly Build'
              ) || null;
            }

            if (!release) {
              core.info('No existing nightly release found.');
              return;
            }

            core.info(`Deleting nightly release ${release.id}`);
            await github.rest.repos.deleteRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
            });

      - name: Move nightly tag to current commit
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ needs.check-changes.outputs.head_sha }}
        with:
          script: |
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/nightly',
                sha: process.env.HEAD_SHA,
                force: true,
              });
              core.info(`Updated tag nightly to ${process.env.HEAD_SHA}`);
            } catch (error) {
              if (
                error.status === 404 ||
                (error.status === 422 && /Reference does not exist/i.test(error.message || ''))
              ) {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'refs/tags/nightly',
                  sha: process.env.HEAD_SHA,
                });
                core.info(`Created tag nightly at ${process.env.HEAD_SHA}`);
              } else {
                throw error;
              }
            }

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: false
          make_latest: false
          target_commitish: ${{ needs.check-changes.outputs.head_sha }}
          body: |
            Automated nightly build for commit `${{ needs.check-changes.outputs.head_sha }}`.

            Build date: `${{ needs.check-changes.outputs.build_date }}`
            Build sequence: `${{ needs.check-changes.outputs.build_seq }}`
            Trigger mode: `${{ needs.check-changes.outputs.trigger_mode }}`
            Forced build: `${{ needs.check-changes.outputs.forced_build }}`
            Upload PyPI: `${{ needs.check-changes.outputs.upload_pypi }}`

            <!-- nightly-source-sha: ${{ needs.check-changes.outputs.head_sha }} -->
          files: |
            dist/*
          overwrite_files: true

  publish-pypi:
    name: Publish nightly package to PyPI
    needs:
      - check-changes
      - build
    if: needs.check-changes.outputs.should_build == 'true' && needs.check-changes.outputs.upload_pypi == 'true'
    runs-on: ubuntu-24.04
    environment:
      name: pypi
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: nightly-dist
          path: dist

      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
